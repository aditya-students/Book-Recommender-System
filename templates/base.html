<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Bibliotheca{% endblock %}</title>
    <meta name="description" content="{% block meta_desc %}The Bibliotheca — A Curated Reading Society. Discover timeless volumes and find your next great read.{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/vintage.css') }}">
</head>
<body>

    <!-- ═══ HEADER ═══ -->
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="header-brand">
                <div class="brand-icon" aria-hidden="true">📖</div>
                <div class="brand-text">
                    <span class="brand-title">The Bibliotheca</span>
                    <span class="brand-tagline">A Curated Reading Society</span>
                </div>
            </a>
            <nav class="header-nav" aria-label="Main navigation">
                <a href="/" class="nav-link {% block nav_home %}{% endblock %}">Top 50</a>
                <a href="/recommend" class="nav-link {% block nav_recommend %}{% endblock %}">Recommend</a>
            </nav>
        </div>
    </header>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <!-- ═══ FOOTER ═══ -->
    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-quote" id="footer-quote">
                <em>"A reader lives a thousand lives before he dies."</em>
            </p>
            <p class="footer-ornament" aria-hidden="true">❧ ✦ ❧</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/vintage.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
